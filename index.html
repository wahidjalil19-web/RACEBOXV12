<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACE BOX</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#050505,#111,#050505);
  color:white;
  text-align:center;
}
.header{
  background:#0f0f0f;
  padding:20px;
  font-size:28px;
  color:#00ff9c;
  letter-spacing:2px;
  box-shadow:0 0 20px #00ff9c33;
}
.container{
  padding:20px;
}
.timer{
  font-size:70px;
  font-weight:bold;
  margin:20px 0;
  color:#00ff9c;
}
.speedBox{
  font-size:40px;
  margin:10px 0;
}
.panel{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}
.card{
  background:#121212;
  padding:18px;
  border-radius:12px;
  box-shadow:0 0 10px #000;
  font-size:20px;
}
.card span{
  font-size:26px;
  color:#00ff9c;
}
.buttons{
  margin-top:25px;
}
button{
  font-size:18px;
  padding:14px 22px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.start{
  background:#00ff9c;
  color:black;
}
.reset{
  background:#ff3b3b;
  color:white;
}
.historybtn{
  background:#2b7cff;
  color:white;
}
#history{
  margin-top:25px;
}
.historyCard{
  background:#121212;
  padding:15px;
  border-radius:10px;
  margin:10px;
  box-shadow:0 0 8px #000;
}
.footer{
  margin-top:30px;
  font-size:14px;
  color:#777;
}
</style>
</head>
<body>
<div class="header">RACE BOX PRO</div>
<div class="container">
<div class="timer" id="timer">0.000</div>
<div class="speedBox">Speed : <span id="speed">0</span> km/h</div>
<div class="speedBox">Top Speed : <span id="topspeed">0</span> km/h</div>
<div class="panel">
<div class="card">0-60 km/h<br><span id="zero60">-</span> s</div>
<div class="card">60 Meter<br><span id="m60">-</span> s</div>
<div class="card">201 Meter<br><span id="m201">-</span> s</div>
<div class="card">401 Meter<br><span id="m401">-</span> s</div>
<div class="card">501 Meter<br><span id="m501">-</span> s</div>
</div>
<div class="buttons">
<button class="start" onclick="startRace()">START</button>
<button class="reset" onclick="resetRace()">RESET</button>
<button class="historybtn" onclick="showHistory()">HISTORY</button>
<button class="historybtn" onclick="exportCSV()">EXPORT CSV</button>
</div>
<div id="history"></div>
<div class="footer">JavaTech Racing Technology</div>
</div>
<script>
let watchID,startTime,startPos,topSpeed=0;
let zero60done=false,m60done=false,m201done=false,m401done=false,m501done=false;
let history=[];

function startRace(){
  topSpeed=0;
  zero60done=m60done=m201done=m401done=m501done=false;
  navigator.geolocation.getCurrentPosition(pos=>{
    startPos=pos.coords;
    startTime=Date.now();
    watchID=navigator.geolocation.watchPosition(updateRace,error,{enableHighAccuracy:true,maximumAge:0,timeout:10000});
  });
}

function updateRace(pos){
  if(pos.coords.accuracy>20)return;
  let speed=(pos.coords.speed||0)*3.6;
  if(speed<3)speed=0;
  document.getElementById("speed").innerText=speed.toFixed(1);
  if(speed>topSpeed && speed>5){topSpeed=speed;document.getElementById("topspeed").innerText=topSpeed.toFixed(1);}
  let time=(Date.now()-startTime)/1000;
  document.getElementById("timer").innerText=time.toFixed(3);
  let distance=getDistance(startPos.latitude,startPos.longitude,pos.coords.latitude,pos.coords.longitude);
  if(speed>=60 && !zero60done){document.getElementById("zero60").innerText=time.toFixed(3);zero60done=true;}
  if(distance>=60 && !m60done){document.getElementById("m60").innerText=time.toFixed(3);m60done=true;}
  if(distance>=201 && !m201done){document.getElementById("m201").innerText=time.toFixed(3);m201done=true;}
  if(distance>=401 && !m401done){document.getElementById("m401").innerText=time.toFixed(3);m401done=true;}
  if(distance>=501 && !m501done){document.getElementById("m501").innerText=time.toFixed(3);m501done=true;navigator.geolocation.clearWatch(watchID);}
  saveHistory(distance,time);
}

function resetRace(){
  navigator.geolocation.clearWatch(watchID);
  document.getElementById("timer").innerText="0.000";
  document.getElementById("speed").innerText="0";
  document.getElementById("topspeed").innerText="0";
  document.getElementById("zero60").innerText="-";
  document.getElementById("m60").innerText="-";
  document.getElementById("m201").innerText="-";
  document.getElementById("m401").innerText="-";
  document.getElementById("m501").innerText="-";
  document.getElementById("history").innerHTML="";
}

function saveHistory(distance,time){
  let data={time:time.toFixed(3),top:topSpeed.toFixed(1),distance:distance.toFixed(1)};
  let races=JSON.parse(localStorage.getItem("raceHistory"))||[];
  if(!races.some(r=>r.distance==data.distance && r.time==data.time)){
    races.unshift(data);
    localStorage.setItem("raceHistory",JSON.stringify(races));
  }
}

function showHistory(){
  let races=JSON.parse(localStorage.getItem("raceHistory"))||[];
  let text="<h2>Race History</h2>";
  races.forEach((h,i)=>{
    text+=`<div class="historyCard">Run ${i+1}<br>Distance: ${h.distance} m<br>Time: ${h.time} s<br>Top Speed: ${h.top} km/h</div>`;
  });
  document.getElementById("history").innerHTML=text;
}

function exportCSV(){
  let races=JSON.parse(localStorage.getItem("raceHistory"))||[];
  let csv="Run,Distance (m),Time (s),Top Speed (km/h)\n";
  races.forEach((h,i)=>{
    csv+=`${i+1},${h.distance},${h.time},${h.top}\n`;
  });
  let blob=new Blob([csv],{type:'text/csv'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;a.download='race_history.csv';a.click();URL.revokeObjectURL(url);
}

function getDistance(lat1,lon1,lat2,lon2){
  let R=6371000;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;
  let a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}
function error(){alert("GPS Error");}
</script>
</body>
</html>
